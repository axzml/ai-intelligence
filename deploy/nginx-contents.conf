# Rate limiting: 10 requests/sec per IP
limit_req_zone $binary_remote_addr zone=contents:10m rate=10r/s;

server {
    listen 80;
    server_name your-domain.com;

    # Rate limiting
    limit_req zone=contents burst=20 nodelay;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy to FastAPI
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # Static files served directly by Nginx (optional optimization)
    # Uncomment after deploying static files
    # location /static/ {
    #     alias /home/YOUR_USERNAME/ai-intelligence/webapp/static/;
    #     expires 7d;
    #     add_header Cache-Control "public, immutable";
    # }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
